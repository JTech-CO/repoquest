<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>RepoQuest — Git/GitHub 학습 에뮬레이터</title>
    <meta
      name="description"
      content="브라우저 안에서 진짜 Git 객체 모델을 시뮬레이션하는 학습용 GitHub 에뮬레이터. 비공식, GitHub, Inc.와 무관."
    />
    <!--
      SPA 딥링크 복원: 404.html 이 인코딩해 보낸 경로(?/...)를 원래 경로로 되돌린다.
      React 가 로드되기 전에 실행되어야 하므로 head 에 인라인으로 둔다.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
